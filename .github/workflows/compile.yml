name: TactForge Cloud Compiler

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Tact source code'
        required: true
      request_id:
        description: 'Unique ID'
        required: true
      callback_url:
        description: 'URL'
        required: true
  repository_dispatch:
    types: [compile_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Compiler
        run: |
          npm init -y
          npm install @tact-lang/compiler@1.6.13 @ton/core @ton/ton @ton/crypto axios --ignore-scripts

      - name: Compile
        id: compile
        env:
          # Use client_payload if repository_dispatch, else inputs
          TACT_CODE: ${{ github.event.client_payload.code || github.event.inputs.code }}
          REQUEST_ID: ${{ github.event.client_payload.request_id || github.event.inputs.request_id }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || github.event.inputs.callback_url }}
        run: |
          # 1. Write the code safely (using env var to avoid shell stripping)
          printf "%s" "$TACT_CODE" > contract.tact
          
          # 2. Create the config file
          cat << 'EOF' > tact.config.json
          {
              "projects": [
                  {
                      "name": "Contract",
                      "path": "./contract.tact",
                      "output": "./build"
                  }
              ]
          }
          EOF
          
          # 3. Use the CLI
          npx tact --config tact.config.json
          
          # 4. Process artifacts and handle callbacks
          cat << 'EOF' > callback.js
          const fs = require('fs');
          const axios = require('axios');

          async function main() {
              const requestId = process.env.REQUEST_ID;
              const callbackUrl = process.env.CALLBACK_URL;

              console.log(`Processing artifacts for request: ${requestId}`);

              try {
                  const codeBoc = fs.readFileSync("./build/Contract_Contract.code.boc").toString("base64");
                  const pkg = JSON.parse(fs.readFileSync("./build/Contract_Contract.pkg", "utf8"));
                  const dataBoc = pkg.data || "te6cckEBAQEAAwAAAUD20kA0";
                  const abi = pkg.abi;

                  console.log("Sending success callback...");
                  await axios.post(callbackUrl, {
                      requestId,
                      success: true,
                      codeBoc,
                      dataBoc,
                      abi
                  });
              } catch (e) {
                  console.error("Failed to read artifacts:", e.message);
                  throw e;
              }
          }
          main().catch(err => { console.error(err); process.exit(1); });
          EOF
          node callback.js

      - name: Failure Callback
        if: failure()
        env:
          REQUEST_ID: ${{ github.event.client_payload.request_id || github.event.inputs.request_id }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || github.event.inputs.callback_url }}
        run: |
          node -e '
          const axios = require("axios");
          axios.post(process.env.CALLBACK_URL, { 
              requestId: process.env.REQUEST_ID, 
              success: false, 
              error: "Cloud compilation failed. Check GitHub Action logs for syntax errors." 
          }).catch(() => {})'
