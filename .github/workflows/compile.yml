name: TactForge Cloud Compiler

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Tact source code'
        required: true
      chat_id:
        description: 'Optional: Telegram chat ID to notify'
        required: false
      request_id:
        description: 'Unique ID to track this build'
        required: true
      callback_url:
        description: 'URL to post the results back to'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Compiler
        run: |
          npm init -y
          npm install @tact-lang/compiler @ton/core @ton/ton @ton/crypto axios

      - name: Compile
        id: compile
        run: |
          cat << 'EOF' > builder.ts
          import fs from 'fs';
          import { beginCell, Cell } from '@ton/core';
          import { runTact } from '@tact-lang/compiler';
          import axios from 'axios';

          async function run() {
              const code = `${{ github.event.inputs.code }}`;
              const requestId = "${{ github.event.inputs.request_id }}";
              const callbackUrl = "${{ github.event.inputs.callback_url }}";

              const result = await runTact({
                  config: { projects: [{ name: "Contract", path: "./contract.tact", output: "./build" }] },
                  fs: {
                      readFile: (path) => path === "./contract.tact" ? Buffer.from(code) : fs.readFileSync(path),
                      writeFile: (path, data) => fs.writeFileSync(path, data),
                      mkdir: (path) => fs.mkdirSync(path, { recursive: true }),
                      exists: (path) => fs.existsSync(path),
                  }
              });

              if (!result.success) throw new Error("Compilation failed");

              const codeBoc = fs.readFileSync("./build/Contract_Contract.code.boc").toString("base64");
              const pkg = JSON.parse(fs.readFileSync("./build/Contract_Contract.pkg", "utf8"));
              const dataBoc = pkg.data || "te6cckEBAQEAAwAAAUD20kA0";
              const abi = pkg.abi;

              // Send result back to Cloudflare
              await axios.post(callbackUrl, {
                  requestId,
                  success: true,
                  codeBoc,
                  dataBoc,
                  abi
              });
          }
          run().catch(async (e) => {
              await axios.post("${{ github.event.inputs.callback_url }}", {
                  requestId: "${{ github.event.inputs.request_id }}",
                  success: false,
                  error: e.message
              });
              process.exit(1);
          });
          EOF
          npx ts-node builder.ts
