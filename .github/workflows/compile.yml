name: TactForge Cloud Compiler

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Tact source code'
        required: true
      chat_id:
        description: 'Optional: Telegram chat ID to notify'
        required: false
      request_id:
        description: 'Unique ID to track this build'
        required: true
      callback_url:
        description: 'URL to post the results back to'
        required: true
      owner_address:
        description: 'Optional: Owner address for subsidized deploy'
        required: false
      deploy_value:
        description: 'Optional: Deploy value for subsidized deploy'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Compiler
        run: |
          npm init -y
          npm install @tact-lang/compiler@1.6.13 @ton/core @ton/ton @ton/crypto axios --ignore-scripts

      - name: Compile
        id: compile
        env:
          TACT_CODE: ${{ github.event.inputs.code }}
          HOT_WALLET_MNEMONIC: ${{ secrets.HOT_WALLET_MNEMONIC }}
          TON_API_KEY: ${{ secrets.TON_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # 1. Write the code safely to a file
          echo "$TACT_CODE" > contract.tact
          
          # 2. Create the config file
          cat << 'EOF' > tact.config.json
          {
              "projects": [
                  {
                      "name": "Contract",
                      "path": "./contract.tact",
                      "output": "./build"
                  }
              ]
          }
          EOF
          
          # 3. Use the CLI
          npx tact --config tact.config.json
          
          # 4. Process artifacts and handle callbacks
          cat << 'EOF' > callback.js
          const fs = require('fs');
          const axios = require('axios');
          const { beginCell, Cell, Address, toNano } = require('@ton/core');
          const { TonClient, WalletContractV4 } = require('@ton/ton');
          const { mnemonicToPrivateKey } = require('@ton/crypto');

          async function main() {
              const requestId = "${{ github.event.inputs.request_id }}";
              const callbackUrl = "${{ github.event.inputs.callback_url }}";
              const chatId = "${{ github.event.inputs.chat_id }}";
              const ownerAddrStr = "${{ github.event.inputs.owner_address }}";
              const deployValueStr = "${{ github.event.inputs.deploy_value }}";

              const codeBoc = fs.readFileSync("./build/Contract_Contract.code.boc").toString("base64");
              const pkg = JSON.parse(fs.readFileSync("./build/Contract_Contract.pkg", "utf8"));
              const dataBoc = pkg.data || "te6cckEBAQEAAwAAAUD20kA0";
              const abi = pkg.abi;

              if (callbackUrl && callbackUrl !== "undefined" && callbackUrl !== "") {
                  console.log("Sending callback to website...");
                  await axios.post(callbackUrl, {
                      requestId,
                      success: true,
                      codeBoc,
                      dataBoc,
                      abi
                  });
              }

              if (ownerAddrStr && ownerAddrStr !== "undefined" && ownerAddrStr !== "") {
                  console.log("Starting Subsidized Auto-Deployment...");
                  const mnemonic = process.env.HOT_WALLET_MNEMONIC.split(" ");
                  const key = await mnemonicToPrivateKey(mnemonic);
                  const wallet = WalletContractV4.create({ publicKey: key.publicKey, workchain: 0 });
                  
                  const client = new TonClient({
                      endpoint: 'https://toncenter.com/api/v2/jsonRPC',
                      apiKey: process.env.TON_API_KEY
                  });

                  const walletProvider = client.open(wallet);
                  const seqno = await walletProvider.getSeqno();

                  const deployMsg = beginCell()
                      .storeUint(1258154509, 32)
                      .storeUint(BigInt(Math.floor(Date.now() / 1000)), 64)
                      .storeRef(Cell.fromBase64(codeBoc))
                      .storeRef(Cell.fromBase64(dataBoc))
                      .storeBit(false) 
                      .storeCoins(BigInt(deployValueStr || "100000000"))
                      .endCell();

                  await walletProvider.sendTransfer({
                      secretKey: key.privateKey,
                      seqno: seqno,
                      messages: [{
                          info: {
                              type: 'internal',
                              dest: Address.parse("EQBHjc_e5d62vZWk7p68-0Hz0VBSDE9tLVNnZiNBPtqy41IT"),
                              value: toNano("0.1"),
                              bounce: false,
                              ihrDisabled: true,
                              bounced: false,
                          },
                          body: beginCell().storeRef(deployMsg).endCell()
                      }],
                      sendMode: 1
                  });

                  console.log("Deployment transaction sent!");

                  if (chatId && chatId !== "undefined" && chatId !== "") {
                      const botToken = process.env.TELEGRAM_BOT_TOKEN;
                      const explorerLink = `https://tonviewer.com/${Address.parse(ownerAddrStr).toString()}`;
                      await axios.post(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                          chat_id: chatId,
                          text: `✅ <b>Contract Deployed!</b>\n\nYour contract has been successfully launched on Mainnet.\n\n🔗 <a href="${explorerLink}">View on Explorer</a>`,
                          parse_mode: 'HTML'
                      });
                  }
              }
          }
          main().catch(err => { console.error(err); process.exit(1); });
          EOF
          node callback.js

      - name: Failure Callback
        if: failure()
        run: |
          node -e 'const axios = require("axios"); axios.post("${{ github.event.inputs.callback_url }}", { requestId: "${{ github.event.inputs.request_id }}", success: false, error: "Cloud compilation failed." }).catch(() => {})'
